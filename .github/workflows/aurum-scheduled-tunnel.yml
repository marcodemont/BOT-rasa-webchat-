name: AURUM Slot Orchestrator (30min + 15min offset)

on:
  workflow_dispatch:
  schedule:
    - cron: '*/15 * * * *'

concurrency:
  group: aurum-slot-orchestrator
  cancel-in-progress: false

jobs:
  orchestrate:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      APP_PORT: 8006
      AURUM_TUNNEL_ID: ${{ secrets.AURUM_TUNNEL_ID }}
      AURUM_TUNNEL_CREDENTIALS_JSON: ${{ secrets.AURUM_TUNNEL_CREDENTIALS_JSON }}
      AURUM_TUNNEL_HOSTNAME: aurum.me.marcodemont.ch
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Determine active slot mode
        id: slot
        shell: bash
        run: |
          set -euo pipefail
          minute="$(date -u +%M)"

          case "$minute" in
            00|30)
              mode="app"
              ;;
            15|45)
              mode="maintenance"
              ;;
            *)
              mode="skip"
              ;;
          esac

          echo "minute=$minute" >> "$GITHUB_OUTPUT"
          echo "mode=$mode" >> "$GITHUB_OUTPUT"
          echo "UTC minute: $minute -> mode: $mode"

      - name: Install dependencies
        if: steps.slot.outputs.mode != 'skip'
        shell: bash
        run: npm ci

      - name: Validate app build
        if: steps.slot.outputs.mode != 'skip'
        shell: bash
        run: npm run build

      - name: Run APP window (online 00-15 and 30-45)
        if: steps.slot.outputs.mode == 'app'
        shell: bash
        run: |
          set -euo pipefail

          mkdir -p "$HOME/.cloudflared"
          printf '%s' "$AURUM_TUNNEL_CREDENTIALS_JSON" > "$HOME/.cloudflared/${AURUM_TUNNEL_ID}.json"
          cat > "$HOME/.cloudflared/aurum.yml" <<EOF
          tunnel: ${AURUM_TUNNEL_ID}
          credentials-file: ${HOME}/.cloudflared/${AURUM_TUNNEL_ID}.json
          ingress:
            - hostname: ${AURUM_TUNNEL_HOSTNAME}
              service: http://localhost:${APP_PORT}
            - service: http_status:404
          EOF

          curl -fsSL https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64 \
            -o "$HOME/cloudflared"
          chmod +x "$HOME/cloudflared"

          npm run dev -- --host 0.0.0.0 --port "${APP_PORT}" --strictPort > aurum-dev.log 2>&1 &
          DEV_PID=$!
          "$HOME/cloudflared" tunnel --config "$HOME/.cloudflared/aurum.yml" run > cloudflared.log 2>&1 &
          TUNNEL_PID=$!

          trap 'kill $DEV_PID $TUNNEL_PID 2>/dev/null || true' EXIT

          for _ in {1..20}; do
            if curl -fsS "http://127.0.0.1:${APP_PORT}" >/dev/null; then
              echo "Healthcheck OK on port ${APP_PORT}."
              break
            fi
            sleep 5
          done

          start_ts="$(date +%s)"
          window_seconds=840

          while true; do
            now="$(date +%s)"
            elapsed=$((now - start_ts))
            if [ "$elapsed" -ge "$window_seconds" ]; then
              echo "App window finished after ${window_seconds}s."
              break
            fi
            kill -0 "$DEV_PID"
            kill -0 "$TUNNEL_PID"
            sleep 15
          done

      - name: Run maintenance window (offline 15-30 and 45-00)
        if: steps.slot.outputs.mode == 'maintenance'
        shell: bash
        run: |
          set -euo pipefail
          echo "Maintenance slot: app remains offline; build validation already passed."
          echo "Use this slot for fixes/merges/deploy prep while traffic is off."
